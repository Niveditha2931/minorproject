version: '3.8'
services:
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: CrisisResponseDashboard

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crisis_response

  api:
    build: ../../backend/api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/CrisisResponseDashboard
    depends_on:
      - mongodb

  ai-service:
    build: ../../backend/ai-service
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - NASA_FIRMS_API_KEY=${NASA_FIRMS_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/crisis_response
    depends_on:
      - postgres

volumes:
  mongo_data:
  postgres_data: